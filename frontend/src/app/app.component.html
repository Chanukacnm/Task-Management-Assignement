<div class="app-shell">
  <header class="app-header">
    <div class="app-header__brand">
      <span class="app-header__logo" aria-hidden="true">✓</span>
      <span class="app-header__title">Task Management</span>
    </div>

    @if (isAuthenticated()) {
      <div class="app-header__user">
        <span class="app-header__greeting">
          Hi, <strong>{{ user()?.displayName }}</strong>
        </span>
        <button type="button" class="btn btn--ghost" (click)="logout()">Sign out</button>
      </div>
    }
  </header>

  <main class="app-main">
    <router-outlet />
  </main>
</div>

<app-toast-container />
